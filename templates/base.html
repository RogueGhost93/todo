{{define "base"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <link id="theme-link" rel="stylesheet" href="/color-theme.css">
    <link rel="stylesheet" href="/css/spectre-icons.css">
    {{ template "stylesheets" . }}
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="manifest" href="/icons/site.webmanifest">
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="/icons/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="/icons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <title>todo</title>
    <script>
        // Apply saved theme immediately to avoid flash
        (function () {
            var saved = localStorage.getItem('theme');
            var def = '{{ .ColorTheme }}';
            if (saved && saved !== def) {
                document.getElementById('theme-link').href = '/color-themes/' + saved + '.css';
            }
        })();
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--page-background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.4;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
        }

        .app-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--label);
            margin-bottom: 0.75rem;
        }

        /* ── Todo list ── */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 0.375rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--input-background);
            border-radius: 0.375rem;
            padding: 0.375rem 0.625rem;
            transition: filter 0.15s ease;
        }

        .todo-item:hover {
            filter: brightness(1.1);
        }

        .todo-item.done {
            opacity: 0.55;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
        }

        .todo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.375rem;
            height: 1.375rem;
            border-radius: 50%;
            border: 1.5px solid;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s ease, color 0.15s ease;
            font-size: 0.6rem;
            text-decoration: none;
        }

        .todo-btn-check {
            border-color: var(--check);
            color: var(--check);
        }

        .todo-btn-check:hover {
            background: var(--check);
            color: var(--page-background);
        }

        .todo-btn-clear {
            border-color: var(--x);
            color: var(--x);
        }

        .todo-btn-clear:hover {
            background: var(--x);
            color: var(--page-background);
        }

        .todo-text {
            flex: 1;
            font-size: 0.875rem;
            cursor: text;
            border-radius: 0.2rem;
        }

        .todo-text:hover {
            opacity: 0.75;
        }

        .todo-edit-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--label);
            color: var(--foreground);
            font-size: 0.875rem;
            font-family: inherit;
            padding: 0;
            outline: none;
            min-width: 0;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--input-background);
            margin: 1rem 0;
        }

        .section-label {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--label);
            opacity: 0.75;
            margin-bottom: 0.6rem;
        }

        .add-form {
            display: flex;
            gap: 0.4rem;
        }

        .add-input {
            flex: 1;
            background: var(--input-background);
            border: 2px solid transparent;
            border-radius: 0.375rem;
            color: var(--foreground);
            font-size: 0.875rem;
            font-family: inherit;
            padding: 0.375rem 0.625rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .add-input::placeholder {
            color: var(--foreground);
            opacity: 0.35;
        }

        .add-input:focus {
            border-color: var(--label);
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--label);
            color: var(--page-background);
            border: none;
            border-radius: 0.375rem;
            padding: 0.375rem 0.875rem;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s ease;
            flex-shrink: 0;
        }

        .add-btn:hover {
            opacity: 0.82;
        }

        .empty-state {
            text-align: center;
            opacity: 0.35;
            font-size: 0.9rem;
            padding: 1.5rem 0;
        }

        /* ── Theme picker ── */
        .theme-toggle {
            position: fixed;
            top: 0.6rem;
            left: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.65rem;
            font-family: inherit;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--foreground);
            opacity: 0.25;
            padding: 0.25rem;
            z-index: 100;
            transition: opacity 0.15s ease;
        }

        .theme-toggle:hover {
            opacity: 0.6;
        }

        .theme-panel {
            position: fixed;
            top: 1.75rem;
            left: 0.75rem;
            background: var(--input-background);
            border-radius: 0.5rem;
            padding: 0.625rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            max-width: 11rem;
            z-index: 99;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-0.25rem);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .theme-panel.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .theme-swatch {
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 2px solid;
            cursor: pointer;
            padding: 0;
            transition: transform 0.15s ease;
        }

        .theme-swatch:hover {
            transform: scale(1.3);
        }

        .theme-swatch.active {
            outline: 2px solid var(--label);
            outline-offset: 2px;
            transform: scale(1.15);
        }
    </style>
    {{ template "css" . }}
</head>

<body>
    <div class="app">
        <h1 class="app-title">todo</h1>
        {{template "content" .}}
    </div>

    <button id="theme-toggle" class="theme-toggle">theme</button>
    <div id="theme-panel" class="theme-panel"></div>
</body>

<script>
    (function () {
        const DEFAULT = '{{ .ColorTheme }}';
        const THEMES = [
            { id: 'dracula',           bg: '#282a36', border: '#ff79c6' },
            { id: 'nord',              bg: '#2e3440', border: '#88c0d0' },
            { id: 'catppuccin-mocha',  bg: '#1e1e2e', border: '#cba6f7' },
            { id: 'catppuccin-latte',  bg: '#eff1f5', border: '#8839ef' },
            { id: 'tokyo-night',       bg: '#1a1b26', border: '#7aa2f7' },
            { id: 'rose-pine',         bg: '#191724', border: '#c4a7e7' },
            { id: 'ayu',               bg: '#fafafa', border: '#55b4d4' },
            { id: 'monokai',           bg: '#272822', border: '#66d9ef' },
            { id: 'gruvbox-dark',      bg: '#282828', border: '#d79921' },
            { id: 'gruvbox-light',     bg: '#fbf1c7', border: '#b16286' },
            { id: 'lucario',           bg: '#2b3e50', border: '#e6db74' },
            { id: 'solarized-dark',    bg: '#002b36', border: '#268bd2' },
            { id: 'solarized-light',   bg: '#eee8d5', border: '#2aa198' },
            { id: 'tomorrow-night',    bg: '#1d1f21', border: '#f0c674' },
            { id: 'tomorrow',          bg: '#ffffff', border: '#eab700' },
            { id: 'zenburn',           bg: '#3f3f3f', border: '#dcdccc' },
        ];

        const link    = document.getElementById('theme-link');
        const toggle  = document.getElementById('theme-toggle');
        const panel   = document.getElementById('theme-panel');

        function activeTheme() {
            return localStorage.getItem('theme') || DEFAULT;
        }

        function setTheme(id, save) {
            link.href = (id === DEFAULT) ? '/color-theme.css' : '/color-themes/' + id + '.css';
            panel.querySelectorAll('.theme-swatch').forEach(function (btn) {
                btn.classList.toggle('active', btn.dataset.theme === id);
            });
            if (save) localStorage.setItem('theme', id);
        }

        function displayName(id) {
            return id.split('-').map(function (w) {
                return w.charAt(0).toUpperCase() + w.slice(1);
            }).join(' ');
        }

        // Build swatches inside the panel
        THEMES.forEach(function (t) {
            var btn = document.createElement('button');
            btn.className = 'theme-swatch';
            btn.dataset.theme = t.id;
            btn.title = displayName(t.id);
            btn.style.background  = t.bg;
            btn.style.borderColor = t.border;
            btn.addEventListener('click', function () {
                setTheme(t.id, true);
                panel.classList.remove('open');
            });
            panel.appendChild(btn);
        });

        // Toggle panel open/close
        toggle.addEventListener('click', function (e) {
            e.stopPropagation();
            panel.classList.toggle('open');
        });

        // Close when clicking outside
        document.addEventListener('click', function () {
            panel.classList.remove('open');
        });

        panel.addEventListener('click', function (e) {
            e.stopPropagation();
        });

        setTheme(activeTheme(), false);
    })();

    // ── Inline editing ──
    document.querySelectorAll('.todo-text').forEach(function (span) {
        span.addEventListener('click', function () {
            var id = span.dataset.id;
            var original = span.textContent.trim();
            var cancelled = false;

            var input = document.createElement('input');
            input.type = 'text';
            input.value = original;
            input.className = 'todo-edit-input';
            span.replaceWith(input);
            input.focus();
            input.select();

            input.addEventListener('blur', function () {
                var newTitle = input.value.trim();
                if (!cancelled && newTitle && newTitle !== original) {
                    fetch('/edit/' + id, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'title=' + encodeURIComponent(newTitle)
                    }).then(function (r) {
                        if (r.ok) span.textContent = newTitle;
                        input.replaceWith(span);
                    }).catch(function () {
                        input.replaceWith(span);
                    });
                } else {
                    input.replaceWith(span);
                }
            });

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.stopPropagation();
                    input.blur();
                }
                if (e.key === 'Escape') {
                    cancelled = true;
                    input.blur();
                }
            });
        });
    });
</script>
{{ template "scripts" . }}

</html>
{{end}}
{{ define "css" }}{{ end }}
{{ define "scripts" }}{{ end }}
{{ define "stylesheets" }}{{ end }}

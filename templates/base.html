{{define "base"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/css/spectre-icons.css">
    <link rel="stylesheet" href="/color-theme.css">
    {{ template "stylesheets" . }}
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="manifest" href="/icons/site.webmanifest">
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="/icons/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="/icons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <title>todo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--page-background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .app {
            max-width: 560px;
            margin: 0 auto;
        }

        .app-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--label);
            margin-bottom: 2rem;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--input-background);
            border-radius: 0.5rem;
            padding: 0.625rem 0.875rem;
            transition: filter 0.15s ease;
        }

        .todo-item:hover {
            filter: brightness(1.1);
        }

        .todo-item.done {
            opacity: 0.55;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
        }

        .todo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.875rem;
            height: 1.875rem;
            border-radius: 50%;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s ease, color 0.15s ease;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .todo-btn-check {
            border-color: var(--check);
            color: var(--check);
        }

        .todo-btn-check:hover {
            background: var(--check);
            color: var(--page-background);
        }

        .todo-btn-clear {
            border-color: var(--x);
            color: var(--x);
        }

        .todo-btn-clear:hover {
            background: var(--x);
            color: var(--page-background);
        }

        .todo-text {
            flex: 1;
            font-size: 0.95rem;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--input-background);
            margin: 1.5rem 0;
        }

        .section-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--label);
            opacity: 0.75;
            margin-bottom: 0.875rem;
        }

        .add-form {
            display: flex;
            gap: 0.5rem;
        }

        .add-input {
            flex: 1;
            background: var(--input-background);
            border: 2px solid transparent;
            border-radius: 0.5rem;
            color: var(--foreground);
            font-size: 0.95rem;
            font-family: inherit;
            padding: 0.625rem 0.875rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .add-input::placeholder {
            color: var(--foreground);
            opacity: 0.35;
        }

        .add-input:focus {
            border-color: var(--label);
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--label);
            color: var(--page-background);
            border: none;
            border-radius: 0.5rem;
            padding: 0.625rem 1.125rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s ease;
            flex-shrink: 0;
        }

        .add-btn:hover {
            opacity: 0.82;
        }

        .empty-state {
            text-align: center;
            opacity: 0.35;
            font-size: 0.9rem;
            padding: 1.5rem 0;
        }
    </style>
    {{ template "css" . }}
</head>

<body>
    <div class="app">
        <h1 class="app-title">todo</h1>
        {{template "content" .}}
    </div>
</body>
{{ template "scripts" . }}

</html>
{{end}}
{{ define "css" }}{{ end }}
{{ define "scripts" }}{{ end }}
{{ define "stylesheets" }}{{ end }}

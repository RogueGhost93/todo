{{define "content"}}
<div class="todo-list">
    {{ if not .TodoList }}
    <p class="empty-state">nothing to do — add something below</p>
    {{ end }}
    {{ range $Todo := .TodoList }}
    {{if not $Todo.Done}}
    <form action="/done/{{$Todo.ID}}" method="POST" class="todo-item">
        <input type="hidden" name="id" value="{{ $Todo.ID }}" />
        <button class="todo-btn todo-btn-check" type="submit" title="Mark done">
            <i class="icon icon-check"></i>
        </button>
        <span class="todo-text">{{ $Todo.Title }}</span>
    </form>
    {{else}}
    <form action="/clear/{{$Todo.ID}}" method="POST" class="todo-item done">
        <button class="todo-btn todo-btn-clear" type="submit" title="Remove">
            <i class="icon icon-cross"></i>
        </button>
        <span class="todo-text">{{ $Todo.Title }}</span>
    </form>
    {{end}}
    {{ end }}
</div>

<hr class="divider">

<p class="section-label">add item</p>
<form action="/add" method="POST" class="add-form">
    <input class="add-input" id="input-title" type="text" name="title"
        placeholder="what needs doing?" autofocus="autofocus" />
    <button class="add-btn" type="submit">↵</button>
</form>
{{end}}
